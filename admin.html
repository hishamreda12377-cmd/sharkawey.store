<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - الصيانة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .panel {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            text-align: center;
        }
        .panel h1 { font-size: 24px; margin-bottom: 10px; }
        .panel p { color: #aaa; margin-bottom: 30px; font-size: 14px; }
        .toggle-wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .toggle-wrap .label { font-size: 16px; font-weight: 600; }
        .toggle {
            width: 60px; height: 32px; background: #333;
            border-radius: 16px; position: relative;
            cursor: pointer; transition: background 0.3s;
        }
        .toggle.on { background: #ff9800; }
        .toggle::after {
            content: ''; position: absolute;
            width: 26px; height: 26px; background: #fff;
            border-radius: 50%; top: 3px; right: 3px;
            transition: transform 0.3s;
        }
        .toggle.on::after { transform: translateX(-28px); }
        .toggle.loading { opacity: 0.5; pointer-events: none; }
        .status {
            display: inline-block; padding: 8px 20px;
            border-radius: 20px; font-size: 14px;
            font-weight: 600; margin-bottom: 20px;
        }
        .status.off { background: rgba(76,175,80,0.2); color: #4caf50; }
        .status.on { background: rgba(255,152,0,0.2); color: #ff9800; }
        .status.loading { background: rgba(100,100,100,0.2); color: #888; }
        .preview-btn {
            display: inline-block; padding: 12px 30px;
            background: #ff9800; color: #000; border: none;
            border-radius: 12px; font-family: 'Cairo', sans-serif;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: transform 0.2s; text-decoration: none;
        }
        .preview-btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(255,152,0,0.4); }
        .info {
            margin-top: 25px; padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px; font-size: 13px;
            color: #888; line-height: 1.8;
        }
        .info code {
            background: rgba(255,152,0,0.2); color: #ff9800;
            padding: 2px 8px; border-radius: 6px; font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- 🔧 ضع بيانات Supabase هنا -->
    <script>
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
    </script>

    <div class="panel">
        <h1>🔧 لوحة التحكم</h1>
        <p>إدارة وضع الصيانة للموقع</p>

        <div class="status loading" id="statusBadge">جاري التحميل...</div>

        <div class="toggle-wrap">
            <span class="label">وضع الصيانة</span>
            <div class="toggle loading" id="maintenanceToggle" onclick="toggleMaintenance()"></div>
        </div>

        <a href="index.html" target="_blank" class="preview-btn">👁️ معاينة الموقع</a>

        <div class="info">
            الحالة الحالية: <code id="stateText">-</code><br>
            آخر تغيير: <code id="lastChange">-</code>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function updateUI(isActive) {
            const toggle = document.getElementById('maintenanceToggle');
            const badge = document.getElementById('statusBadge');
            const stateText = document.getElementById('stateText');

            toggle.classList.remove('loading');

            if (isActive) {
                toggle.classList.add('on');
                badge.className = 'status on';
                badge.textContent = '⚠️ صيانة مفعلة';
                stateText.textContent = 'مفعّل';
            } else {
                toggle.classList.remove('on');
                badge.className = 'status off';
                badge.textContent = '✅ متاح';
                stateText.textContent = 'مغلق';
            }
        }

        async function loadStatus() {
            try {
                const { data, error } = await supabase
                    .from('maintenance')
                    .select('is_active, updated_at')
                    .eq('id', 1)
                    .single();

                if (data) {
                    updateUI(data.is_active);
                    if (data.updated_at) {
                        document.getElementById('lastChange').textContent =
                            new Date(data.updated_at).toLocaleString('ar-EG');
                    }
                }
            } catch (e) {
                console.error('Error:', e);
            }
        }

        async function toggleMaintenance() {
            const toggle = document.getElementById('maintenanceToggle');
            toggle.classList.add('loading');

            try {
                const { data } = await supabase
                    .from('maintenance')
                    .select('is_active')
                    .eq('id', 1)
                    .single();

                const newState = !data.is_active;

                await supabase
                    .from('maintenance')
                    .update({ is_active: newState, updated_at: new Date().toISOString() })
                    .eq('id', 1);

                updateUI(newState);
                document.getElementById('lastChange').textContent =
                    new Date().toLocaleString('ar-EG');
            } catch (e) {
                console.error('Error:', e);
                toggle.classList.remove('loading');
            }
        }

        loadStatus();
    </script>
</body>
</html>
